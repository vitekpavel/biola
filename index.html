<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Procvičování</title>

<style>
body {
  font-family: Arial;
  background:#f3f4f6;
  max-width:600px;
  margin:auto;
  padding:10px;
}

h2 { text-align:center; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

img {
  width:100%;
  height:50vh;
  object-fit:contain;
  background:#f9fafb;
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  font-size:16px;
}

.buttons {
  display:flex;
  gap:10px;
  width:100%;
  margin-top:6px;
}

button {
  flex:1;
  padding:10px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

button.secondary { background:#6b7280; }
button.reset {
  margin-top:10px;
  background:#dc2626;
}

.info {
  margin-top:10px;
  font-size:16px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Procvičování obrázků</h2>

<div class="card">

  <img id="img">

  <input id="input" placeholder="Napiš název">

  <div class="buttons">
    <button onclick="check()">✅ Odeslat</button>
    <button class="secondary" onclick="dontKnow()">Nevím</button>
  </div>

  <button class="reset" onclick="resetProgress()">🔄 Reset</button>

  <div id="info" class="info"></div>

</div>

<script>

// ✅ DATA
const files = [
  { file: "blatouch_bahenni", name: "blatouch bahenní" },
  { file: "briza_belokora", name: "bříza bělokorá" }
];

// ✅ načtení pokroku
let saved = localStorage.getItem("quizProgress");

let queue = saved ? JSON.parse(saved) : files.map(f => ({
  ...f,
  score: 0
}));

let current;

// ✅ uložení
function saveProgress(){
  localStorage.setItem("quizProgress", JSON.stringify(queue));
}

// ✅ normalizace
function norm(s){
 return s.toLowerCase()
   .normalize('NFD')
   .replace(/[\u0300-\u036f]/g,'')
   .replace(/_/g,' ')
   .trim();
}

// ✅ další obrázek
function next(){

 if(queue.length === 0){
   document.getElementById('info').innerText = "🎉 Hotovo!";
   document.getElementById('img').src = "";
   saveProgress();
   return;
 }

 current = queue[Math.floor(Math.random() * queue.length)];

 document.getElementById('img').src =
   "obrazky/" + current.file + ".jpg";

 document.getElementById('input').value = "";
 document.getElementById('info').innerText =
   "Zbývá: " + queue.length;
}

// ✅ kontrola odpovědi
function check(){

 let val = norm(document.getElementById('input').value);
 let correct = norm(current.name);

 if(val === correct){

   current.score++;

   // ✅ 3x správně → pryč
   if(current.score >= 3){
     queue = queue.filter(x => x !== current);
   }

   document.getElementById('info').innerText =
     "✅ Správně (" + current.score + "/3) | Zbývá: " + queue.length;

   saveProgress();

 } else {

   document.getElementById('info').innerText =
     "❌ Správně: " + current.name;

   // 🔁 chytré opakování
   queue = queue.filter(x => x !== current);
   queue.unshift(current);
   queue.unshift(current);

 }

 setTimeout(next, 2000);
}

// ✅ Nevím
function dontKnow(){

 document.getElementById('info').innerText =
   "👉 " + current.name;

 queue = queue.filter(x => x !== current);

 // 🔁 ještě silnější opakování
 queue.unshift(current);
 queue.unshift(current);
 queue.unshift(current);

 setTimeout(next, 3000);
}

// ✅ reset
function resetProgress(){
 if(confirm("Opravdu chceš začít znovu?")){
   localStorage.removeItem("quizProgress");
   queue = files.map(f => ({ ...f, score: 0 }));
   next();
 }
}

// ✅ Enter
document.getElementById('input')
.addEventListener('keypress', e=>{
 if(e.key === "Enter") check();
});

next();

</script>

</body>
</html>
