h2 { text-align:center; }

.card {

  flex-direction:column;
  align-items:center;
}

img {
  width:100%;

}

  gap:10px;

  border:none;

button.reset {

  background:#dc2626;
}

.info {

  font-size:16px;

// ✅ načtení pokroku
let saved = localStorage.getItem("quizProgress");

let queue = saved ? JSON.parse(saved) : files.map(f => ({
  ...f,
  score: 0
}));

let current;

// ✅ uložení
function saveProgress(){
  localStorage.setItem("quizProgress", JSON.stringify(queue));
}

// ✅ normalizace
function norm(s){
 return s.toLowerCase()
   .normalize('NFD')
   .replace(/[\u0300-\u036f]/g,'')
   .replace(/_/g,' ')
   .trim();
}

// ✅ další obrázek
function next(){

 if(queue.length === 0){
   document.getElementById('info').innerText = "🎉 Hotovo!";
   document.getElementById('img').src = "";
   saveProgress();
   return;
 }

 current = queue[Math.floor(Math.random() * queue.length)];

 document.getElementById('img').src =
   "obrazky/" + current.file + ".jpg";

 document.getElementById('input').value = "";
 document.getElementById('info').innerText =
   "Zbývá: " + queue.length;
}

// ✅ kontrola odpovědi
function check(){

 let val = norm(document.getElementById('input').value);
 let correct = norm(current.name);

 if(val === correct){

   current.score++;

   // ✅ 3x správně → pryč
   if(current.score >= 3){
     queue = queue.filter(x => x !== current);
   }

   document.getElementById('info').innerText =
     "✅ Správně (" + current.score + "/3) | Zbývá: " + queue.length;

   saveProgress();

 } else {

   document.getElementById('info').innerText =
     "❌ Správně: " + current.name;

   // 🔁 chytré opakování
   queue = queue.filter(x => x !== current);
   queue.unshift(current);
   queue.unshift(current);

 }

 setTimeout(next, 2000);
}

// ✅ Nevím
function dontKnow(){

 document.getElementById('info').innerText =
   "👉 " + current.name;

 queue = queue.filter(x => x !== current);

 // 🔁 ještě silnější opakování
 queue.unshift(current);
 queue.unshift(current);
 queue.unshift(current);

 setTimeout(next, 3000);
}

// ✅ reset
function resetProgress(){
 if(confirm("Opravdu chceš začít znovu?")){
   localStorage.removeItem("quizProgress");
   queue = files.map(f => ({ ...f, score: 0 }));
   next();
 }
}

// ✅ Enter
document.getElementById('input')
.addEventListener('keypress', e=>{
 if(e.key === "Enter") check();
});

next();
