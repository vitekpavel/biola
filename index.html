h2 { text-align:center; }

.card {
  background:white;
  padding:12px;
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

img {
  width:100%;
  height:50vh;
  object-fit:contain;
  margin-bottom:10px;
  background:#f9fafb;

}

@media (min-width: 800px) {

input {

}

.buttons {
  display:flex;

}

button {

  font-size:16px;
  border:none;
  border-radius:8px;

  color:white;
}

button.secondary {
  background:#6b7280;
}

button.reset {
  margin-top:10px;
  background:#dc2626;
}

button:active {

}

  text-align:center;

// ✅ local storage
let saved = localStorage.getItem("quizQueue");
let queue = saved ? JSON.parse(saved) : [...files];
queue = queue.filter(x => x && x.file && x.name);

let current;

function saveProgress(){
  localStorage.setItem("quizQueue", JSON.stringify(queue));
}

// ✅ normalizace
function norm(s){
 return s.toLowerCase()
   .normalize('NFD')
   .replace(/[\u0300-\u036f]/g,'')
   .replace(/_/g,' ')
   .replace(/\s+/g,' ')
   .trim();
}

// ✅ přesun dopředu (bez změny počtu)
function moveToFront(item){
  queue = queue.filter(x => x !== item);
  queue.unshift(item);
}

// ✅ další obrázek
function next(){

 if(queue.length === 0){
   document.getElementById('info').innerText = "🎉 Hotovo!";
   document.getElementById('img').src = "";
   return;
 }

 current = queue[Math.floor(Math.random() * queue.length)];

 document.getElementById('img').src =
   "obrazky/" + current.file + ".jpg";

 document.getElementById('input').value = "";
 document.getElementById('info').innerText =
   "Zbývá: " + queue.length;

 document.getElementById('input').focus();
}

// ✅ kontrola
function check(){

 let val = norm(document.getElementById('input').value);
 let correct = norm(current.name);

 if(val === correct){

   queue = queue.filter(x => x !== current);

   document.getElementById('info').innerText =
     "✅ Správně | Zbývá: " + queue.length;

   saveProgress();

 } else {

   document.getElementById('info').innerText =
     "❌ Správně: " + current.name;

   moveToFront(current);
 }

 setTimeout(next, 2000);
}

// ✅ nevím
function dontKnow(){

 document.getElementById('info').innerText =
   "👉 " + current.name;

 moveToFront(current);

 setTimeout(next, 3000);
}

// ✅ reset
function resetProgress(){

 if(confirm("Opravdu chceš začít znovu?")){
   localStorage.removeItem("quizQueue");
   queue = [...files];
   next();
 }

}

// ✅ enter
document.getElementById('input')
.addEventListener('keypress', function(e){
 if(e.key === "Enter") check();
});

// start
next();
